<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotérica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img src="caixa-economica-federal-logo-vector.png" class="imagem">
    <br>
    <form id="formulario">
        <fieldset class="caixa">
            <div class="nome">
            <legend>Fila do Nubank</legend>
            <label for="nome">Nome:
                <input
                type="text"
                placeholder="Informe seu nome"
                id="nome"
                class="caixa_entrada"
                required
                >
            </label>
            <br>
            <label for="normal">Normal
                <input
                type="radio"
                name="radio_s"
                id="normal"
                value="normal"
                >
            </label>
            <label for="prioridade">Prioridade
                <input 
                type="radio"
                name="radio_s"
                id="prioridade"
                value="prioridade"
                required
                >
            </label>
            <br><br>
            </div>

            <button type="submit" class="botao">Cadastrar</button>
            <input type="button" id="cadastrado" onclick="listar()" class="botao" value="Consultar">

        </fieldset>
    </form>

    <div>
        <fieldset class="caixa">
            <legend class="nome">Fila de espera</legend>
    <div id="resultado_espera" class="nome"></div>
        </fieldset>
    </div> 

    <div>
        <br/>
           <input type="button" id="atendimento" onclick="atender()" class="botao" value="Atendimento">
    </div>
     <script src="script.js"></script>
</body>
</html>
